<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Buddy – Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --error: #ef4444;
      --success: #22c55e;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(99,102,241,0.12);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-header p {
      font-size: 0.875rem;
      opacity: 0.85;
      margin-top: 0.25rem;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 0.85rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      background: var(--surface-2);
      border: none;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--primary);
      background: var(--surface);
      border-bottom: 2px solid var(--primary);
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: #f1f5f9;
    }

    .form-body {
      padding: 1.75rem 2rem 2rem;
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    input::placeholder { color: #94a3b8; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .alert {
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .alert.show { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">💼</div>
      <h1>Job Application Buddy</h1>
      <p>Your personal job search assistant</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <div class="form-body">
      <!-- Login Panel -->
      <div id="panel-login" class="form-panel active">
        <div id="login-error" class="alert alert-error"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="field">
            <label for="login-email">Email address</label>
            <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button class="btn btn-primary" type="submit" id="login-btn">Sign In</button>
        </form>
      </div>

      <!-- Register Panel -->
      <div id="panel-register" class="form-panel">
        <div id="register-error" class="alert alert-error"></div>
        <div id="register-success" class="alert alert-success"></div>
        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="field">
            <label for="reg-name">Full name</label>
            <input id="reg-name" type="text" placeholder="Jane Smith" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="reg-email">Email address</label>
            <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="reg-password">Password <span style="color:#94a3b8;font-weight:400">(min 8 chars)</span></label>
            <input id="reg-password" type="password" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary" type="submit" id="register-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/index.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Please wait…';
      } else {
        btn.disabled = false;
        btn.textContent = btnId === 'login-btn' ? 'Sign In' : 'Create Account';
      }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError(id) {
      document.getElementById(id).classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError('login-error');
      setLoading('login-btn', true);
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } catch (err) {
        showError('login-error', err.message);
      } finally {
        setLoading('login-btn', false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError('register-error');
      document.getElementById('register-success').classList.remove('show');
      setLoading('register-btn', true);
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        const s = document.getElementById('register-success');
        s.textContent = 'Account created! Redirecting…';
        s.classList.add('show');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (err) {
        showError('register-error', err.message);
      } finally {
        setLoading('register-btn', false);
      }
    }
  </script>
</body>
</html>
